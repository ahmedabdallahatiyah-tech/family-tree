<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شجرة العائلة - قبيلة العجمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-title">
        <h1>🌳 شجرة العائلة</h1>
        <span class="subtitle">قبيلة العجمان — شجرة تفاعلية</span>
      </div>
      <div class="stats-bar">
        <span>👤 العدد: <span class="num" id="totalCount">0</span></span>
        <span>📊 الأجيال: <span class="num" id="generationCount">-</span></span>
      </div>
      <div class="header-controls">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="ابحث عن اسم...">
          <button id="searchBtn" class="btn">🔍</button>
        </div>
        <div class="zoom-controls">
          <button id="zoomOutBtn" class="btn btn-icon">−</button>
          <span id="zoomLevel">100%</span>
          <button id="zoomInBtn" class="btn btn-icon">+</button>
          <button id="resetBtn" class="btn btn-icon">⟲</button>
        </div>
        <button id="fullscreenBtn" class="btn btn-icon">⛶</button>
        <button id="exportBtn" class="btn">📥 تصدير</button>
        <button id="refreshBtn" class="btn">🔄 تحديث</button>
      </div>
    </header>
    <div id="statusBar" class="status-bar">⏳ جاري تحميل البيانات...</div>
    <main id="treeContainer">
      <div class="empty-state">⏳ جاري تحميل شجرة العائلة...</div>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
