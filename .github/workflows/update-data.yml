name: تحديث بيانات الشجرة تلقائياً

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تحميل البيانات من Google Sheets
        run: |
          curl -sL \
            -H "Cache-Control: no-cache" \
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAgb_bYt1XcaC6AKpvLPpbugHMP_VhijT1t3GUshhv4IvJRPT01g1_LzTYN26ey6x1XeZAFngeP2yM/pub?output=csv" \
            -o scripts/data.csv

      - name: تحويل CSV إلى JSON
        run: node scripts/convert-csv.js

      - name: إنشاء ملف الطابع الزمني
        run: |
          echo "{\"updated\":\"$(TZ='Asia/Riyadh' date '+%Y/%m/%d %H:%M:%S')\"}" > data-timestamp.json

      - name: رفع التغييرات
        run: |
          git config user.name "Family Tree Bot"
          git config user.email "bot@family-tree"
          git add data.json data-timestamp.json scripts/data.csv
          git diff --staged --quiet || git commit -m "🔄 تحديث تلقائي للبيانات $(date '+%Y-%m-%d %H:%M')"
          git push
